<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Items V5</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="app-header">
    <div class="container-row">
      <div class="brand-icon"><i data-lucide="file-up"></i></div>
      <div>
        <h1>ระบบ New Items V5 วัสดุการแพทย์</h1>
        <p id="meetingRoundText">ส่งเอกสาร และตรวจสอบสถานะ</p>
      </div>
      <div class="header-actions">
        <button id="adminBtn" class="link-btn">admin</button>
      </div>
    </div>
  </header>

  <main class="main-shell">
    <nav id="mainNav" class="main-nav">
      <button data-page="submit" class="nav-btn nav-active"><i data-lucide="send"></i>ส่งเอกสาร</button>
      <button data-page="status" class="nav-btn"><i data-lucide="clipboard-list"></i>ตรวจสอบสถานะ</button>
      <button data-page="workflow" class="nav-btn admin-only hidden"><i data-lucide="workflow"></i>แบบฟอร์มอนุมัติ</button>
      <button data-page="admin" class="nav-btn admin-only hidden"><i data-lucide="settings"></i>ตั้งค่าระบบ</button>
    </nav>

    <section id="page-submit" class="page-section">
      <div id="submitRoot"></div>
    </section>

    <section id="page-status" class="page-section hidden">
      <div id="statusRoot"></div>
    </section>

    <section id="page-workflow" class="page-section hidden">
      <div id="workflowRoot"></div>
    </section>

    <section id="page-admin" class="page-section hidden">
      <div id="adminRoot"></div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/submit.js"></script>
  <script src="js/status.js"></script>
  <script src="js/workflow.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/pdf.js"></script>
</body>
</html>
